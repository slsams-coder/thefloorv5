<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Floor Game</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Import Map to handle React and Lucide imports directly in the browser -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
    }
  }
  </script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #020617; } /* bg-slate-950 */
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- The main React Application -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useLayoutEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Trophy, Clock, User, Play, FastForward, Shield, Sword, Edit3, Check, Image as ImageIcon, X, Plus, Trash2, Dices, Save, UploadCloud, PartyPopper, RefreshCcw, Settings, Ban, Cloud, CloudOff, ChevronRight, ChevronLeft } from 'lucide-react';

    // ---------------------------------------------------------
    // MASTER ANSWER ARRAYS (METHOD 1)
    // Replace these placeholder items with your actual 40 answers!
    // The first item maps to 1.jpg, the second to 2.jpg, etc.
    // ---------------------------------------------------------
    const masterAnswers = {
      "INDIA": ["McDonalds", "Nike", "Apple", "Google", "Amazon", "Tesla"], 
      "HONG KONG": ["Tung Chung", "Wan Chai", "Tsim Shan Tsui", "Diamond Hill", "Tsuen Wan", "Tseung Kwan O", "Lohas Park", "Yau Tong", "Kwun Tong"],
      "CARS": ["Toyota", "Ford", "Honda", "Chevrolet", "BMW", "Mercedes"],
      "MOVIES": ["Avatar", "Titanic", "Inception", "The Matrix", "Jaws", "Jurassic Park"],
      "HEROES": ["Superman", "Batman", "Spider-Man", "Wonder Woman", "Iron Man", "Flash"],
      "LANDMARKS": ["Eiffel Tower", "Statue of Liberty", "Taj Mahal", "Colosseum", "Great Wall"],
      "NATIONS": ["USA", "Canada", "Brazil", "UK", "France", "Japan"],
      "TOONS": ["Mickey Mouse", "Bugs Bunny", "SpongeBob", "Homer Simpson", "Tom", "Jerry"],
      "ANIMALS": ["Lion", "Tiger", "Elephant", "Giraffe", "Zebra", "Kangaroo"],
      "HISTORY": ["George Washington", "Abraham Lincoln", "Julius Caesar", "Cleopatra"],
      "SCIENCE": ["Albert Einstein", "Isaac Newton", "Marie Curie", "Galileo", "Charles Darwin"],
      "SPORTS": ["Soccer", "Basketball", "Tennis", "Baseball", "Golf", "Rugby"],
      "TOOLS": ["Hammer", "Wrench", "Screwdriver", "Pliers", "Saw", "Drill"],
      "FASHION": ["Gucci", "Prada", "Louis Vuitton", "Chanel", "Versace", "Dior"],
      "GAMING": ["Mario", "Zelda", "Sonic", "Master Chief", "Kratos", "Pikachu"],
      "DESSERTS": ["Cake", "Ice Cream", "Pie", "Brownie", "Cookie", "Donut"],
      "SPACE": ["Sun", "Moon", "Earth", "Mars", "Jupiter", "Saturn"],
      "MUSIC": ["The Beatles", "Elvis", "Michael Jackson", "Madonna", "Queen", "Nirvana"],
      "BOOKS": ["Harry Potter", "Lord of the Rings", "1984", "Moby Dick", "The Great Gatsby"],
      "FLAGS": ["USA Flag", "UK Flag", "Japan Flag", "Canada Flag", "Brazil Flag"]
    };

    // Auto-generate the starting decks using the master array and local file paths (Option 2)
    const initialDecks = {};
    Object.keys(masterAnswers).forEach(category => {
      initialDecks[category] = masterAnswers[category].map((answer, index) => ({
        name: answer,
        url: `./images/${category}/${index + 1}.jpg`
      }));
    });

    const GRID_COLS = 5;
    const GRID_ROWS = 4;
    const INITIAL_TIMER = 30; 

    const useAudio = () => {
      const audioCtx = useRef(null);
      const initAudio = () => {
        if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
      };

      const playPassSound = () => {
        initAudio();
        if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
        const now = audioCtx.current.currentTime;
        const osc1 = audioCtx.current.createOscillator();
        const gain1 = audioCtx.current.createGain();
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(150, now);
        osc1.frequency.exponentialRampToValueAtTime(40, now + 0.4);
        gain1.gain.setValueAtTime(0.3, now);
        gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc1.connect(gain1);
        gain1.connect(audioCtx.current.destination);
        osc1.start(now);
        osc1.stop(now + 0.4);
      };

      const playTick = (freq = 440) => {
        initAudio();
        if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
        const osc = audioCtx.current.createOscillator();
        const gain = audioCtx.current.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.current.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.current.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.current.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.current.destination);
        osc.start();
        osc.stop(audioCtx.current.currentTime + 0.1);
      };

      const playRoundEndMusic = (isWin = true) => {
        initAudio();
        if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
        const now = audioCtx.current.currentTime;
        const melody = isWin ? [440, 554, 659, 880] : [220, 196, 174, 110]; 
        melody.forEach((freq, i) => {
          const osc = audioCtx.current.createOscillator();
          const gain = audioCtx.current.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + i * 0.15);
          gain.gain.setValueAtTime(0.1, now + i * 0.15);
          gain.gain.exponentialRampToValueAtTime(0.01, now + (i + 1) * 0.15);
          osc.connect(gain);
          gain.connect(audioCtx.current.destination);
          osc.start(now + i * 0.15);
          osc.stop(now + (i + 1) * 0.15);
        });
      };

      const playVictoryFanfare = () => {
        initAudio();
        if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
        const now = audioCtx.current.currentTime;
        const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
        notes.forEach((freq, i) => {
          const osc = audioCtx.current.createOscillator();
          const gain = audioCtx.current.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(freq, now + i * 0.12);
          gain.gain.setValueAtTime(0.05, now + i * 0.12);
          gain.gain.linearRampToValueAtTime(0, now + i * 0.12 + 0.6);
          osc.connect(gain);
          gain.connect(audioCtx.current.destination);
          osc.start(now + i * 0.12);
          osc.stop(now + i * 0.12 + 0.6);
        });
      };

      return { playPassSound, playRoundEndMusic, playTick, playVictoryFanfare };
    };

    const AutoScaledText = ({ text, containerWidth, containerHeight, color = "white", maxFontSize = 150 }) => {
      const [fontSize, setFontSize] = useState(12);

      useLayoutEffect(() => {
        if (!text || containerWidth <= 0 || containerHeight <= 0) return;
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        const words = text.split(/\s+/);
        let low = 8, high = maxFontSize, bestSize = 8;

        while (low <= high) {
          const mid = Math.floor((low + high) / 2);
          context.font = `900 ${mid}px sans-serif`;
          let maxWordWidth = 0;
          words.forEach(w => maxWordWidth = Math.max(maxWordWidth, context.measureText(w).width));
          const lineHeight = mid * 0.9;
          let lines = 1, currentLineWidth = 0;
          const spaceWidth = context.measureText(' ').width;

          words.forEach((word, i) => {
            const wordWidth = context.measureText(word).width;
            if (i === 0) { currentLineWidth = wordWidth; }
            else {
              if (currentLineWidth + spaceWidth + wordWidth > containerWidth * 0.85) {
                lines++;
                currentLineWidth = wordWidth;
              } else { currentLineWidth += spaceWidth + wordWidth; }
            }
          });

          if (maxWordWidth <= containerWidth * 0.95 && (lines * lineHeight) <= containerHeight * 0.9) {
            bestSize = mid; low = mid + 1;
          } else { high = mid - 1; }
        }
        setFontSize(bestSize);
      }, [text, containerWidth, containerHeight, maxFontSize]);

      return (
        <div 
          className="flex items-center justify-center text-center p-1 leading-[0.85] font-black uppercase tracking-tighter select-none pointer-events-none break-words overflow-hidden w-full h-full"
          style={{ fontSize: `${fontSize}px`, color, textShadow: '0 4px 12px rgba(0,0,0,0.5)' }}
        >
          {text}
        </div>
      );
    };

    function App() {
      const [gameState, setGameState] = useState('setup');
      const [cells, setCells] = useState([]);
      const [attacker, setAttacker] = useState(null);
      const [defender, setDefender] = useState(null);
      const [timer, setTimer] = useState({ attacker: INITIAL_TIMER, defender: INITIAL_TIMER });
      const [activeDuelist, setActiveDuelist] = useState(null); 
      const [highlightedIndex, setHighlightedIndex] = useState(null);
      const [gridSize, setGridSize] = useState({ width: 0, height: 0 });
      const [decks, setDecks] = useState(initialDecks); // LOAD PRE-GENERATED DECKS HERE
      const [currentImageIndex, setCurrentImageIndex] = useState(0);
      const [editingRegion, setEditingRegion] = useState(null); 
      const [editForm, setEditForm] = useState({ owner: '', category: '' }); 
      const [conqueredIndices, setConqueredIndices] = useState([]);
      const [hoveredOwner, setHoveredOwner] = useState(null);
      const [playedPlayers, setPlayedPlayers] = useState(new Set());
      const [isShowingAnswer, setIsShowingAnswer] = useState(false);
      const [lastFeedbackType, setLastFeedbackType] = useState(null); 
      
      const gridRef = useRef(null);
      const { playPassSound, playRoundEndMusic, playTick, playVictoryFanfare } = useAudio();

      const initFloor = () => {
        // ---------------------------------------------------------
        // STARTING PLAYERS & CATEGORIES
        // Replace "John", "Sarah", etc. with your real contestants!
        // Make sure the category names exactly match those in masterAnswers.
        // ---------------------------------------------------------
        const startingPlayers = [
          { name: "Ayaan", category: "INDIA" },
          { name: "Fham", category: "HONG KONG" },
          { name: "Mike", category: "CARS" },
          { name: "Emily", category: "MOVIES" },
          { name: "David", category: "HEROES" },
          { name: "Jessica", category: "LANDMARKS" },
          { name: "Chris", category: "NATIONS" },
          { name: "Ashley", category: "TOONS" },
          { name: "Matthew", category: "ANIMALS" },
          { name: "Amanda", category: "HISTORY" },
          { name: "Daniel", category: "SCIENCE" },
          { name: "Melissa", category: "SPORTS" },
          { name: "James", category: "TOOLS" },
          { name: "Laura", category: "FASHION" },
          { name: "Robert", category: "GAMING" },
          { name: "Nicole", category: "DESSERTS" },
          { name: "William", category: "SPACE" },
          { name: "Megan", category: "MUSIC" },
          { name: "Joseph", category: "BOOKS" },
          { name: "Rachel", category: "FLAGS" }
        ];

        const newCells = startingPlayers.map((player, i) => ({
          id: i,
          category: player.category,
          owner: player.name,
          color: `hsl(${(i * 360) / 20}, 70%, 45%)`,
        }));
        
        setCells(newCells);
        setPlayedPlayers(new Set());
        setGameState('floor');
      };

      useLayoutEffect(() => {
        if (gameState === 'setup' || !gridRef.current) return;
        const measure = () => {
          if (gridRef.current) {
            setGridSize({
              width: gridRef.current.clientWidth,
              height: gridRef.current.clientHeight
            });
          }
        };
        measure();
        const observer = new ResizeObserver(measure);
        observer.observe(gridRef.current);
        window.addEventListener('resize', measure);
        return () => {
          observer.disconnect();
          window.removeEventListener('resize', measure);
        };
      }, [gameState]);

      const checkVictory = (currentCells) => {
        const owners = new Set(currentCells.map(c => c.owner));
        if (owners.size === 1) {
          setGameState('victory');
          playVictoryFanfare();
        }
      };

      const targetableOwners = useMemo(() => {
        if (!attacker) return [];
        const attackerIndices = cells.map((c, i) => (c.owner === attacker.owner ? i : null)).filter(i => i !== null);
        const neighbors = new Set();
        attackerIndices.forEach(idx => {
          const r = Math.floor(idx / GRID_COLS), c = idx % GRID_COLS;
          [{ r: r - 1, c }, { r: r + 1, c }, { r, c: c - 1 }, { r, c: c + 1 }].forEach(p => {
            if (p.r >= 0 && p.r < GRID_ROWS && p.c >= 0 && p.c < GRID_COLS) {
              const owner = cells[p.r * GRID_COLS + p.c].owner;
              if (owner !== attacker.owner) neighbors.add(owner);
            }
          });
        });
        return Array.from(neighbors);
      }, [attacker, cells]);

      const handleDuelEnd = (winnerRole) => {
        playRoundEndMusic(true);
        const isAttackerWinner = winnerRole === 'attacker';
        const winningOwnerId = isAttackerWinner ? attacker.owner : defender.owner;
        const losingOwnerId = isAttackerWinner ? defender.owner : attacker.owner;
        const winningColor = isAttackerWinner ? attacker.color : defender.color;
        
        const finalCategory = attacker.category;

        setPlayedPlayers(prev => {
          const next = new Set(prev);
          next.add(attacker.owner);
          next.add(defender.owner);
          return next;
        });

        const changedIndices = [];
        const newCells = cells.map((cell, idx) => {
          if (cell.owner === losingOwnerId) {
            changedIndices.push(idx);
            return { ...cell, owner: winningOwnerId, color: winningColor, category: finalCategory };
          }
          if (cell.owner === winningOwnerId) return { ...cell, category: finalCategory };
          return cell;
        });

        setConqueredIndices(changedIndices);
        setCells(newCells);
        setGameState('floor');
        setActiveDuelist(null);
        setAttacker({ owner: winningOwnerId, category: finalCategory, color: winningColor });
        setDefender(null);
        checkVictory(newCells);
        setTimeout(() => setConqueredIndices([]), 2000);
      };

      const cancelDuel = () => {
        setGameState('floor');
        setActiveDuelist(null);
        setAttacker(null);
        setDefender(null);
      };

      const startDuel = (owner, category, color) => {
        if (gameState !== 'floor' || gameState === 'randomizing') return;
        if (attacker && owner === attacker.owner) { setAttacker(null); return; }
        if (!attacker) {
          setAttacker({ owner, category, color });
        } else if (targetableOwners.includes(owner)) {
          setDefender({ owner, category, color });
          setTimer({ attacker: INITIAL_TIMER, defender: INITIAL_TIMER });
          setActiveDuelist('attacker');
          setCurrentImageIndex(0);
          setGameState('duel');
        }
      };

      const pickRandomAttacker = () => {
        setGameState('randomizing');
        setAttacker(null);
        const uniqueOwners = Array.from(new Set(cells.map(c => c.owner)));
        if (uniqueOwners.length <= 1) return;
        let candidates = uniqueOwners.filter(owner => !playedPlayers.has(owner));
        if (candidates.length === 0) {
          candidates = uniqueOwners;
          setPlayedPlayers(new Set());
        }
        let duration = 3000, elapsed = 0, interval = 60;
        const run = () => {
          const idx = Math.floor(Math.random() * cells.length);
          setHighlightedIndex(idx);
          playTick(200 + (elapsed / duration) * 400); 
          elapsed += interval; 
          interval = Math.min(400, interval * 1.05);
          if (elapsed < duration) setTimeout(run, interval);
          else {
            const winner = candidates[Math.floor(Math.random() * candidates.length)];
            const cell = cells.find(c => c.owner === winner);
            const finalIdx = cells.indexOf(cell);
            setHighlightedIndex(finalIdx);
            setTimeout(() => {
              setAttacker({ owner: cell.owner, category: cell.category, color: cell.color });
              setHighlightedIndex(null);
              setGameState('floor');
            }, 1500);
          }
        };
        run();
      };

      const handleNextImage = () => {
        if (isShowingAnswer) return;
        setLastFeedbackType('correct');
        setIsShowingAnswer(true);
        setTimeout(() => {
          const deck = decks[defender?.category] || [];
          if (deck.length > 0) setCurrentImageIndex(prev => (prev + 1) % deck.length);
          setActiveDuelist(activeDuelist === 'attacker' ? 'defender' : 'attacker');
          playTick(600);
          setIsShowingAnswer(false);
        }, 1000);
      };

      const handlePass = () => {
        if (isShowingAnswer) return;
        playPassSound();
        setLastFeedbackType('pass');
        setTimer(prev => {
          const newVal = Math.max(0, prev[activeDuelist] - 3);
          return { ...prev, [activeDuelist]: newVal };
        });
        setIsShowingAnswer(true);
        setTimeout(() => {
          const deck = decks[defender?.category] || [];
          if (deck.length > 1) setCurrentImageIndex(prev => (prev + 1) % deck.length);
          setIsShowingAnswer(false);
        }, 1000);
      };

      const addDeckImages = async (category, files) => {
        const readers = Array.from(files).map(file => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve({
              url: e.target.result,
              name: file.name.split('.')[0].replace(/[-_]/g, ' ')
            });
            reader.readAsDataURL(file);
          });
        });
        const newImages = await Promise.all(readers);
        setDecks(prev => ({ ...prev, [category]: [...(prev[category] || []), ...newImages] }));
      };

      const removeDeckImage = (category, idx) => {
        setDecks(prev => ({ ...prev, [category]: (prev[category] || []).filter((_, i) => i !== idx) }));
      };

      const renameDeckImage = (category, idx, newName) => {
        setDecks(prev => ({
          ...prev,
          [category]: prev[category].map((img, i) => i === idx ? { ...img, name: newName } : img)
        }));
      };

      const updateRegionInfo = (oldOwner, newOwner, newCategory) => {
        if (!editingRegion) return;
        const oldCategory = editingRegion.category;

        setCells(prev => prev.map(c => c.owner === oldOwner ? { ...c, owner: newOwner, category: newCategory } : c));
        
        setAttacker(prev => prev && prev.owner === oldOwner ? { ...prev, owner: newOwner, category: newCategory } : prev);
        setDefender(prev => prev && prev.owner === oldOwner ? { ...prev, owner: newOwner, category: newCategory } : prev);
        
        setPlayedPlayers(prev => {
          if (prev.has(oldOwner)) {
            const next = new Set(prev);
            next.delete(oldOwner);
            next.add(newOwner);
            return next;
          }
          return prev;
        });

        if (oldCategory && oldCategory !== newCategory) {
          setDecks(prev => {
            if (!prev[oldCategory]) return prev;
            const next = { ...prev, [newCategory]: prev[oldCategory] };
            delete next[oldCategory];
            return next;
          });
        }
      };

      const regions = useMemo(() => {
        if (cells.length === 0) return [];
        const visited = new Set(), regionsList = [];
        cells.forEach((cell, idx) => {
          if (visited.has(idx)) return;
          const current = { owner: cell.owner, category: cell.category, color: cell.color, indices: [], minR: 99, maxR: -1, minC: 99, maxC: -1 };
          const q = [idx]; visited.add(idx);
          while (q.length > 0) {
            const curr = q.shift();
            const r = Math.floor(curr / GRID_COLS), c = curr % GRID_COLS;
            current.indices.push(curr);
            current.minR = Math.min(current.minR, r); current.maxR = Math.max(current.maxR, r);
            current.minC = Math.min(current.minC, c); current.maxC = Math.max(current.maxC, c);
            [{ r: r-1, c }, { r: r+1, c }, { r, c: c-1 }, { r, c: c+1 }].forEach(n => {
              const nIdx = n.r * GRID_COLS + n.c;
              if (n.r >= 0 && n.r < GRID_ROWS && n.c >= 0 && n.c < GRID_COLS && !visited.has(nIdx) && cells[nIdx].owner === cell.owner) {
                visited.add(nIdx); q.push(nIdx);
              }
            });
          }
          let sumR = 0, sumC = 0;
          current.indices.forEach(idx => { sumR += Math.floor(idx / GRID_COLS); sumC += idx % GRID_COLS; });
          const avgR = sumR / current.indices.length; const avgC = sumC / current.indices.length;
          let bestIdx = current.indices[0], minDist = Infinity;
          current.indices.forEach(idx => {
            const r = Math.floor(idx / GRID_COLS), c = idx % GRID_COLS;
            const dist = Math.pow(r - avgR, 2) + Math.pow(c - avgC, 2);
            if (dist < minDist) { minDist = dist; bestIdx = idx; }
          });
          current.centerIdx = bestIdx;
          regionsList.push(current);
        });
        return regionsList;
      }, [cells]);

      useEffect(() => {
        let interval;
        if (gameState === 'duel' && activeDuelist && !isShowingAnswer) {
          interval = setInterval(() => {
            setTimer(prev => {
              const val = prev[activeDuelist] - 1;
              if (val <= 5 && val > 0) playTick(880); 
              if (val <= 0) { 
                handleDuelEnd(activeDuelist === 'attacker' ? 'defender' : 'attacker'); 
                return { ...prev, [activeDuelist]: 0 }; 
              }
              return { ...prev, [activeDuelist]: val };
            });
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [gameState, activeDuelist, isShowingAnswer]);

      if (gameState === 'setup') {
        return (
          <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-4">
            <div className="flex flex-col items-center mb-12">
              <span className="text-blue-400 font-bold tracking-[0.2em] mb-2 uppercase text-sm">HKTAYY3 Presents:</span>
              <div className="text-8xl font-black text-blue-500 italic uppercase tracking-tighter drop-shadow-[0_15px_15px_rgba(0,0,0,0.5)] text-center">THE FLOOR</div>
            </div>
            <button onClick={initFloor} className="bg-blue-600 hover:bg-blue-500 px-12 py-6 rounded-2xl font-black text-3xl shadow-[0_8px_0_rgb(30,58,138)] transition-all active:translate-y-2">START NEW GAME</button>
          </div>
        );
      }

      return (
        <div className="h-screen bg-black text-white flex flex-col font-sans select-none overflow-hidden">
          <header className="h-16 bg-slate-900 border-b border-white/5 flex justify-between items-center px-8 z-[60] relative">
            <div className="flex items-center gap-6">
              <div className="flex flex-col">
                <span className="text-blue-400 font-bold text-[10px] uppercase tracking-widest leading-none mb-1">HKTAYY3 Presents:</span>
                <span className="text-blue-500 font-black italic text-xl uppercase tracking-tighter leading-none">THE FLOOR</span>
              </div>
            </div>
            
            {gameState === 'duel' && (
              <div className="flex gap-12 items-center">
                 <div className={`flex flex-col items-center transition-all duration-300 ${activeDuelist === 'attacker' ? 'scale-110' : 'opacity-30'}`}>
                  <span className={`text-[10px] font-black uppercase transition-colors ${timer.attacker <= 5 ? 'text-red-500 animate-pulse' : 'text-red-400'}`}>{attacker?.owner}</span>
                   <div className={`text-3xl font-mono font-black tabular-nums tracking-tighter transition-colors ${timer.attacker <= 5 ? 'text-red-500' : 'text-white'}`}>
                   {timer.attacker}
                  </div>
                </div>
                 <div className="text-lg italic font-black text-slate-700">VS</div>
                 <div className={`flex flex-col items-center transition-all duration-300 ${activeDuelist === 'defender' ? 'scale-110' : 'opacity-30'}`}>
                  <span className={`text-[10px] font-black uppercase transition-colors ${timer.defender <= 5 ? 'text-red-500 animate-pulse' : 'text-blue-400'}`}>{defender?.owner}</span>
                   <div className={`text-3xl font-mono font-black tabular-nums tracking-tighter transition-colors ${timer.defender <= 5 ? 'text-red-500' : 'text-white'}`}>
                   {timer.defender}
                  </div>
                </div>
              </div>
            )}

            <div className="flex gap-4">
                {gameState === 'duel' ? (
                 <button onClick={cancelDuel} className="bg-red-600 hover:bg-red-500 text-white px-6 py-2 rounded-xl font-black flex items-center gap-2 transition-all shadow-[0_4px_0_rgb(153,27,27)] active:translate-y-1 text-sm">
                   <Ban size={16} /> CANCEL DUEL
                 </button>
                ) : (
                  <button onClick={pickRandomAttacker} disabled={gameState !== 'floor' || attacker} className="bg-white text-black px-6 py-2 rounded-xl font-black flex items-center gap-2 hover:bg-blue-100 disabled:opacity-20 transition-all shadow-[0_4px_0_rgb(200,200,200)] active:translate-y-1 text-sm">
                   <Dices size={16} /> RANDOMIZER
                 </button>
                )}
            </div>
          </header>

          <main className="flex-1 relative bg-slate-950 overflow-hidden">
            {gameState === 'victory' && (
              <div className="absolute inset-0 z-[200] bg-slate-950 flex flex-col items-center justify-center overflow-hidden animate-in fade-in duration-1000">
                <div className="relative z-10 flex flex-col items-center text-center p-8">
                  <div className="bg-amber-400 p-8 rounded-full shadow-[0_0_100px_rgba(251,191,36,0.8)] animate-bounce mb-8">
                   <Trophy size={120} className="text-slate-900" />
                 </div>
                  <div className="flex flex-col items-center mb-6">
                   <span className="text-amber-400/80 font-bold tracking-[0.4em] uppercase text-xl mb-4">HKTAYY3 Presents:</span>
                    <h1 className="text-8xl font-black italic uppercase tracking-tighter text-white">THE ULTIMATE <span className="text-amber-400">CHAMPION</span></h1>
                 </div>
                  <div className="text-6xl font-black text-amber-400 italic mb-8 animate-pulse">{cells[0]?.owner}</div>
                 <button onClick={() => setGameState('setup')} className="bg-white text-black px-12 py-5 rounded-2xl font-black text-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-4 shadow-2xl">
                   <RefreshCcw size={28} /> RESTART TOURNAMENT
                 </button>
               </div>
              </div>
            )}

            <div className="w-full h-full relative" ref={gridRef}>
              <div className="w-full h-full grid grid-cols-5 grid-rows-4 absolute inset-0">
               {cells.map((cell, idx) => {
                  const isAttacker = attacker?.owner === cell.owner;
                  const isTarget = attacker && targetableOwners.includes(cell.owner);
                  const isHighlighted = highlightedIndex === idx;
                  const isConquered = conqueredIndices.includes(idx);
                  const isRandomizing = gameState === 'randomizing';
                  const isDimmed = (attacker && !isAttacker && !isTarget) || (isRandomizing && !isHighlighted);
                  const isHoveredTarget = isTarget && hoveredOwner === cell.owner;
                  const r = Math.floor(idx / GRID_COLS), c = idx % GRID_COLS;
                  const neighbors = {
                    top: (r > 0) ? cells[(r - 1) * GRID_COLS + c] : null,
                    bottom: (r < GRID_ROWS - 1) ? cells[(r + 1) * GRID_COLS + c] : null,
                    left: (c > 0) ? cells[r * GRID_COLS + (c - 1)] : null,
                    right: (c < GRID_COLS - 1) ? cells[r * GRID_COLS + (c + 1)] : null
                  };
                  const borderClass = `
                    ${!neighbors.top || neighbors.top.owner !== cell.owner || isAttacker ? `border-t-4 ${isAttacker ? 'border-t-amber-400' : 'border-t-white/20'}` : 'border-t-0'}
                    ${!neighbors.bottom || neighbors.bottom.owner !== cell.owner || isAttacker ? `border-b-4 ${isAttacker ? 'border-b-amber-400' : 'border-b-white/20'}` : 'border-b-0'}
                    ${!neighbors.left || neighbors.left.owner !== cell.owner || isAttacker ? `border-l-4 ${isAttacker ? 'border-l-amber-400' : 'border-l-white/20'}` : 'border-l-0'}
                    ${!neighbors.right || neighbors.right.owner !== cell.owner || isAttacker ? `border-r-4 ${isAttacker ? 'border-r-amber-400' : 'border-r-white/20'}` : 'border-r-0'}
                  `;
                  return (
                   <div key={idx} onMouseEnter={() => setHoveredOwner(cell.owner)} onMouseLeave={() => setHoveredOwner(null)} onClick={() => startDuel(cell.owner, cell.category, cell.color)}
                     className={`relative transition-all duration-150 box-border cursor-pointer overflow-hidden ${borderClass} ${isDimmed ? 'opacity-20 grayscale scale-95 blur-[1px]' : 'opacity-100'} ${isHighlighted ? 'z-[110] !scale-110 !opacity-100 shadow-[0_0_60px_white] brightness-150' : 'z-10'} ${isConquered ? 'animate-pulse z-50' : ''} ${isHoveredTarget ? 'brightness-125' : ''}`}
                     style={{ backgroundColor: isHighlighted ? 'white' : cell.color }}>
                     {isHoveredTarget && <div className="absolute inset-0 bg-red-500/40 animate-pulse pointer-events-none" />}
                     {(isHighlighted && isRandomizing) && <div className="absolute inset-0 flex items-center justify-center pointer-events-none p-2 overflow-hidden"><span className="text-slate-900 font-black italic text-4xl whitespace-nowrap scale-125 animate-in zoom-in duration-100">{cell.owner}</span></div>}
                     {isAttacker && <div className="absolute inset-0 bg-amber-400/30 animate-[pulse_1.5s_infinite] shadow-[inset_0_0_20px_rgba(251,191,36,0.5)] pointer-events-none" />}
                   </div>
                  );
                })}
              </div>

              {(gameState === 'floor' || gameState === 'randomizing') && gridSize.width > 0 && gridSize.height > 0 && regions.map((region, idx) => {
                const cellW = gridSize.width / GRID_COLS; const cellH = gridSize.height / GRID_ROWS;
                const left = region.minC * cellW; const top = region.minR * cellH; const width = (region.maxC - region.minC + 1) * cellW; const height = (region.maxR - region.minR + 1) * cellH;
                const centerX = ((region.centerIdx % GRID_COLS) - region.minC) * cellW + (cellW / 2); const centerY = (Math.floor(region.centerIdx / GRID_COLS) - region.minR) * cellH + (cellH / 2);
                const isAttackerRegion = attacker && attacker.owner === region.owner;
                const isTargetRegion = attacker && targetableOwners.includes(region.owner);
                const isHighlightedRegion = highlightedIndex !== null && cells[highlightedIndex]?.owner === region.owner;
                const isRandomizing = gameState === 'randomizing';
                const isHidden = (attacker && !isAttackerRegion && !isTargetRegion) || (isRandomizing && !isHighlightedRegion);
                const isHovered = hoveredOwner === region.owner;
                const clipPathData = region.indices.map(cellIdx => {
                  const r = Math.floor(cellIdx / GRID_COLS) - region.minR;
                  const c = (cellIdx % GRID_COLS) - region.minC;
                  const x = c * cellW; const y = r * cellH;
                  return `M${x},${y} h${cellW} v${cellH} h-${cellW} z`;
                }).join(' ');

                return (
                  <div key={idx} onMouseEnter={() => setHoveredOwner(region.owner)} onMouseLeave={() => setHoveredOwner(null)}
                    className={`absolute transition-all duration-300 pointer-events-none ${isHidden ? 'opacity-0 scale-75' : 'opacity-100 scale-100'} z-40`}
                    style={{ left, top, width, height, clipPath: `path('${clipPathData}')`, WebkitClipPath: `path('${clipPathData}')` }}>
                   <div className="absolute flex flex-col items-center justify-center gap-1 transition-all duration-300" style={{ left: centerX, top: centerY, transform: 'translate(-50%, -50%)', width: cellW * 0.9, height: cellH * 0.9 }}>
                     {!isHidden && !isRandomizing && (
                       <button onClick={(e) => { 
                         e.stopPropagation(); 
                         setEditingRegion(region); 
                         setEditForm({ owner: region.owner, category: region.category });
                       }} className={`absolute -top-4 -right-4 bg-black/40 hover:bg-white text-white hover:text-black p-2 rounded-lg pointer-events-auto transition-all z-50 backdrop-blur-sm border border-white/10 ${isHovered ? 'opacity-100' : 'opacity-0'}`}>
                         <Edit3 size={12} />
                       </button>
                      )}
                     <div onClick={(e) => { e.stopPropagation(); startDuel(region.owner, region.category, region.color); }}
                     className={`px-2 py-1 rounded-full font-black tracking-tighter uppercase backdrop-blur-md shadow-2xl transition-all duration-300 pointer-events-auto cursor-pointer ${isHighlightedRegion && isRandomizing ? 'bg-white text-black scale-[2.5] z-50' : isAttackerRegion ? 'bg-amber-400 text-black scale-110 border-2 border-white' : 'bg-black/60 text-white text-[8px]'} ${isTargetRegion && isHovered ? 'scale-110 bg-red-600' : ''}`}>
                       {region.owner}
                     </div>
                      <div className={`w-full h-[40%] flex items-center justify-center transition-transform duration-200 ${isTargetRegion && isHovered ? 'scale-110' : ''}`}>
                       {!isAttackerRegion ? <AutoScaledText text={region.category} containerWidth={cellW * 0.8} containerHeight={cellH * 0.3} maxFontSize={24} /> : <div className="flex flex-col items-center justify-center text-amber-400 animate-bounce"><Sword size={16} strokeWidth={3} /></div>}
                     </div>
                     {isTargetRegion && <div className={`absolute -bottom-6 transition-opacity flex flex-col items-center ${isHovered ? 'opacity-100' : 'opacity-0'}`}><Sword size={16} className="text-red-500 animate-bounce" /></div>}
                   </div>
                 </div>
                );
              })}
            </div>

            {gameState === 'duel' && (
              <div className="absolute inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-between p-6 animate-in fade-in duration-500 overflow-hidden">
                <div className="text-center py-2">
                   <div className="text-[10px] font-black text-blue-500 uppercase tracking-[0.3em] mb-1">CATEGORY</div>
                   <div className="text-3xl font-black text-white italic uppercase tracking-tighter">{defender?.category}</div>
               </div>
                <div className="flex-1 w-full max-w-5xl flex flex-col gap-4 min-h-0 items-center justify-center relative">
                  <div className="w-full h-full bg-black rounded-3xl border-4 border-slate-900 shadow-2xl relative overflow-hidden flex items-center justify-center">
                   {decks[defender?.category]?.[currentImageIndex] ? (
                     <img key={currentImageIndex} src={decks[defender?.category][currentImageIndex].url} className="w-full h-full object-contain animate-in fade-in zoom-in duration-300" alt="Quiz" />
                   ) : (
                     <div className="flex flex-col items-center gap-4 text-slate-700">
                        <ImageIcon size={60} strokeWidth={1} />
                        <p className="font-black text-sm uppercase tracking-tighter">Deck Empty</p>
                        <p className="text-[10px] text-slate-500">Ensure local files exist at ./images/{defender?.category}/...</p>
                     </div>
                   )}
                   <div className="absolute bottom-4 left-4 flex items-center gap-3 bg-black/60 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10">
                     {activeDuelist === 'attacker' ? <Sword size={16} className="text-red-500" /> : <Shield size={16} className="text-blue-500" />}
                     <div className="text-sm font-black italic uppercase leading-none">{activeDuelist === 'attacker' ? attacker?.owner : defender?.owner}</div>
                   </div>
                 </div>
                  <div className={`h-16 w-full max-w-2xl transition-all duration-300 flex items-center justify-center rounded-2xl border-2 overflow-hidden ${isShowingAnswer ? `opacity-100 scale-100 ${lastFeedbackType === 'pass' ? 'bg-red-500/20 border-red-500' : 'bg-green-500/20 border-green-500'}` : 'opacity-0 scale-95 border-transparent'}`}>
                   {isShowingAnswer && (
                     <div className="flex items-center gap-6 animate-in slide-in-from-bottom-2 duration-300">
                       <div className="flex items-center gap-2">
                         {lastFeedbackType === 'pass' ? <FastForward size={24} className="text-red-500" /> : <Check size={24} className="text-green-500" />}
                         <span className="text-[10px] font-black text-white/50 uppercase tracking-widest">ANSWER:</span>
                       </div>
                       <div className="text-3xl font-black italic tracking-tighter uppercase text-white drop-shadow-md">{decks[defender?.category]?.[currentImageIndex]?.name}</div>
                     </div>
                   )}
                 </div>
               </div>
                <div className="flex gap-4 mt-4 w-full max-w-2xl pb-4">
                 <button disabled={isShowingAnswer} onClick={handlePass} className="flex-1 bg-slate-800 hover:bg-slate-700 disabled:opacity-50 rounded-2xl font-black text-sm flex items-center justify-center gap-2 active:scale-95 transition-all py-3 shadow-[0_4px_0_rgb(30,30,30)]"><FastForward size={18} /> PASS (-3s)</button>
                 <button disabled={isShowingAnswer} onClick={handleNextImage} className="flex-[1.5] bg-green-600 hover:bg-green-500 disabled:opacity-50 rounded-2xl font-black text-2xl italic tracking-tighter transition-all py-3 flex items-center justify-center gap-3 shadow-[0_4px_0_rgb(21,128,61)]"><Check size={28} strokeWidth={4} /> CORRECT</button>
               </div>
              </div>
            )}

            {editingRegion && (
              <div className="absolute inset-0 z-[200] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6 animate-in zoom-in duration-200">
                 <div className="bg-slate-900 w-full max-w-4xl h-[90vh] rounded-3xl border border-white/10 flex flex-col overflow-hidden shadow-2xl">
                   <div className="p-6 border-b border-white/5 flex justify-between items-center bg-slate-800/50">
                     <div className="flex items-center gap-4">
                        <div className="p-3 bg-blue-600 rounded-xl"><Settings className="text-white" /></div>
                        <div>
                          <h2 className="text-2xl font-black uppercase tracking-tighter italic">Edit Duelist Properties</h2>
                          <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Customizing Region owned by {editingRegion.owner}</p>
                        </div>
                     </div>
                     <button onClick={() => setEditingRegion(null)} className="p-2 hover:bg-white/10 rounded-full transition-colors"><X size={24} /></button>
                   </div>

                   <div className="flex-1 overflow-y-auto p-8 grid grid-cols-1 md:grid-cols-2 gap-12">
                      <div className="space-y-8">
                        <div className="space-y-4">
                          <label className="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em]">Owner Name</label>
                          <input 
                            type="text" 
                            value={editForm.owner}
                            onChange={(e) => setEditForm(prev => ({ ...prev, owner: e.target.value }))}
                            className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 font-black text-xl focus:border-blue-500 outline-none transition-all"
                          />
                        </div>
                        <div className="space-y-4">
                          <label className="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em]">Category Subject</label>
                          <input 
                            type="text" 
                            value={editForm.category}
                            onChange={(e) => setEditForm(prev => ({ ...prev, category: e.target.value }))}
                            className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 font-black text-xl focus:border-blue-500 outline-none transition-all"
                          />
                        </div>
                        <div className="p-6 bg-blue-500/10 rounded-2xl border border-blue-500/20">
                          <p className="text-sm text-blue-200 leading-relaxed font-medium">
                            Changing these values will update all cells belonging to this duelist. When a duelist wins, they take over the neighbor's territory but keep their winning subject!
                          </p>
                        </div>
                      </div>

                      <div className="space-y-6 flex flex-col h-full">
                        <div className="flex justify-between items-center">
                          <label className="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em]">Deck Images ({decks[editingRegion.category]?.length || 0})</label>
                          <label className="bg-white text-black px-4 py-1.5 rounded-lg font-black text-xs cursor-pointer hover:bg-blue-500 hover:text-white transition-all flex items-center gap-2">
                            <UploadCloud size={14} /> UPLOAD OVERRIDE
                            <input type="file" multiple accept="image/*" className="hidden" onChange={(e) => addDeckImages(editingRegion.category, e.target.files)} />
                          </label>
                        </div>

                        <div className="flex-1 bg-black/40 rounded-2xl border-2 border-white/5 p-4 overflow-y-auto max-h-[400px]">
                          {decks[editingRegion.category]?.length > 0 ? (
                            <div className="grid grid-cols-2 gap-4">
                              {decks[editingRegion.category].map((img, idx) => (
                                <div key={idx} className="group relative aspect-square bg-slate-800 rounded-xl overflow-hidden border border-white/5 flex items-center justify-center text-center">
                                  {/* Fallback text if local image doesn't exist yet */}
                                  <span className="text-[10px] text-slate-500 absolute z-0 px-2">Missing<br/>{img.url}</span>
                                  <img src={img.url} className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity relative z-10" />
                                  <div className="absolute inset-0 flex flex-col justify-end p-2 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity z-20">
                                    <input 
                                      className="bg-black/50 text-[10px] font-black uppercase w-full p-1 rounded outline-none border border-white/20 mb-1"
                                      value={img.name}
                                      onChange={(e) => renameDeckImage(editingRegion.category, idx, e.target.value)}
                                    />
                                    <button onClick={() => removeDeckImage(editingRegion.category, idx)} className="w-full py-1 bg-red-600/80 hover:bg-red-600 rounded text-[8px] font-black uppercase">Delete</button>
                                  </div>
                                </div>
                              ))}
                            </div>
                          ) : (
                            <div className="h-full flex flex-col items-center justify-center text-slate-600 gap-4">
                              <ImageIcon size={48} strokeWidth={1} />
                              <p className="text-xs font-black uppercase tracking-widest text-center">No images in this deck yet</p>
                            </div>
                          )}
                        </div>
                      </div>
                   </div>
                   
                   <div className="p-6 bg-slate-800/50 border-t border-white/5 flex justify-end">
                      <button onClick={() => {
                        updateRegionInfo(editingRegion.owner, editForm.owner, editForm.category);
                        setEditingRegion(null);
                      }} className="bg-blue-600 hover:bg-blue-500 text-white px-10 py-3 rounded-xl font-black text-sm transition-all shadow-[0_4px_0_rgb(30,58,138)] active:translate-y-1">SAVE CHANGES</button>
                   </div>
                 </div>
              </div>
            )}
          </main>

          <footer className="h-10 bg-slate-900 border-t border-white/5 flex items-center px-8 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] justify-between">
            <div className="flex gap-6">
              <span>{cells.length} Active Tiles</span>
              <span>{regions.length} Active Duelists</span>
            </div>
            <div className="flex gap-4 items-center">
              <Cloud size={12} className="text-green-500" />
              <span>Local Session Active</span>
            </div>
          </footer>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
